name: Android CI

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected_version_name=$(grep '^VERSION_NAME=' app/version.properties | cut -d'=' -f2)
          if [ "$expected_version_name" != "${{ github.ref_name }}" ]; then
            echo "Tag '${{ github.ref_name }}' does not match VERSION_NAME '$expected_version_name'."
            exit 1
          fi

      - name: Build with Gradle
        run: ./gradlew :app:assembleRelease

      - name: Verify release artifact version metadata
        run: |
          expected_version_name=$(grep '^VERSION_NAME=' app/version.properties | cut -d'=' -f2)
          expected_version_code=$(grep '^VERSION_CODE=' app/version.properties | cut -d'=' -f2)
          output_metadata=app/build/outputs/apk/release/output-metadata.json
          actual_version_name=$(perl -0ne 'print $1 if /"versionName"\s*:\s*"([^"]+)"/' "$output_metadata")
          actual_version_code=$(perl -0ne 'print $1 if /"versionCode"\s*:\s*([0-9]+)/' "$output_metadata")
          if [ "$actual_version_name" != "$expected_version_name" ]; then
            echo "Release artifact versionName '$actual_version_name' does not match '$expected_version_name'."
            exit 1
          fi
          if [ "$actual_version_code" != "$expected_version_code" ]; then
            echo "Release artifact versionCode '$actual_version_code' does not match '$expected_version_code'."
            exit 1
          fi

      - name: Sign app APK
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: List APK output
        run: ls -al ./app/build/outputs/apk/release/

      - name: Rename APK with tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv ${{ steps.sign_app.outputs.signedFile }} ./app/build/outputs/apk/release/shelfdroid-${{ github.ref_name }}.apk

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('shelfdroid-{0}.apk', github.ref_name) || format('shelfdroid-{0}.apk', github.sha) }}
          path: |
            ./app/build/outputs/apk/release/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ./app/build/outputs/apk/release/shelfdroid-${{ github.ref_name }}.apk
